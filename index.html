<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Logo and Title -->
    <title>English Janala | Best Platform For Learning English</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- Font Awsome -->
    <script
      src="https://kit.fontawesome.com/d8e34e8eec.js"
      crossorigin="anonymous"
    ></script>

    <!-- Daisy UI + Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li>
                <a href="" class="btn btn-outline btn-primary"
                  ><i class="fa-solid fa-circle-question"></i>FAQ</a
                >
              </li>
              <li>
                <a href="" class="btn btn-outline btn-primary"
                  ><i class="fa-solid fa-book-open"></i>Learn</a
                >
              </li>
              <li>
                <a href="" class="btn btn-outline btn-primary"
                  ><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a
                >
              </li>
            </ul>
          </div>
          <a class="btn btn-ghost">
            <span class="text-xl font-bold">English</span>
            <img src="./assets/logo.png" alt="" />
            <span class="text-xl">জানালা</span>
          </a>
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 space-x-4">
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-circle-question"></i>FAQ</a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-book-open"></i>Learn</a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </header>

    <main>
      <section
        class="max-w-[1600px] mx-auto flex flex-col-reverse md:flex-row gap-10 lg:gap-64 items-center justify-between"
      >
        <div class="content flex-1 space-y-6">
          <h2 class="text-5xl font-bold">
            <span class="text-[#00BCFF]">English</span> is Easy!!
          </h2>
          <p class="font-bangla text-xl text-[#18181B]">
            আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
            আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
            অন্য একটি Level এ
          </p>
          <div class="space-y-4">
            <input type="text" placeholder="Type here" class="input block" />
            <input
              type="password"
              class="input validator block"
              required
              placeholder="Password"
              minlength="8"
            />
          </div>
          <button class="btn btn-primary">Get Started</button>
        </div>
        <div class="flex-1">
          <img src="./assets/hero-student.png" alt="" />
        </div>
      </section>
    </main>
  </body>
</html>
